<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ライブQ&A管理ツール｜両学長</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f6fa; --surface: #ffffff; --surface2: #f0f1f8; --border: #dde0f0;
    --text: #1a1d35; --text-muted: #7b82b0; --accent: #5c6bc0;
    --blue: #42a5f5; --blue-bg: #e3f2fd; --yellow: #f59f00; --yellow-bg: #fff8e1;
    --green: #43a047; --red: #ef5350; --purple: #9c27b0; --purple-bg: #f3e5f5;
    --highlight: rgba(92,107,192,0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; }

  /* Setup */
  #setup-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px; max-width: 480px; width: 100%; }
  .setup-logo { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .setup-logo span { color: var(--accent); }
  .setup-desc { color: var(--text-muted); font-size: 14px; line-height: 1.7; margin-bottom: 28px; }
  .setup-label { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; display: block; }
  .setup-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; padding: 12px 16px; outline: none; transition: border-color 0.2s; margin-bottom: 8px; }
  .setup-input:focus { border-color: var(--accent); }
  .setup-input::placeholder { color: var(--text-muted); }
  .setup-hint { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; }
  .setup-btn { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; margin-bottom: 12px; }
  .setup-btn:hover { background: #7986cb; }
  .demo-btn { width: 100%; padding: 12px; background: transparent; color: var(--text-muted); border: 1px dashed var(--border); border-radius: 10px; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .demo-btn:hover { color: var(--yellow); border-color: var(--yellow); }
  .setup-err { font-size: 12px; color: var(--red); margin-top: 8px; display: none; }

  .demo-banner { background: rgba(255,202,40,0.12); border-bottom: 1px solid rgba(255,202,40,0.3); padding: 8px 24px; text-align: center; font-size: 12px; font-weight: 700; color: var(--yellow); display: none; }
  .demo-banner.show { display: block; }

  #app { display: none; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; }
  .logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .live-badge { display: flex; align-items: center; gap: 6px; background: rgba(239,83,80,0.15); border: 1px solid rgba(239,83,80,0.4); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 700; color: var(--red); letter-spacing: 1px; }
  .live-dot { width: 7px; height: 7px; background: var(--red); border-radius: 50%; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .small-btn { font-size: 11px; color: var(--text-muted); background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s; }
  .small-btn:hover { color: var(--text); border-color: var(--text-muted); }

  .stats-bar { display: flex; gap: 12px; padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .stat { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 13px; }
  .stat-num { font-weight: 700; font-size: 16px; }
  .stat-num.blue { color: var(--blue); }
  .stat-num.yellow { color: var(--yellow); }
  .stat-label { color: var(--text-muted); font-size: 12px; }

  .main { display: grid; grid-template-columns: 360px 1fr; min-height: calc(100vh - 115px); }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 18px; overflow-y: auto; max-height: calc(100vh - 115px); }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }

  .url-input-row { display: flex; gap: 8px; }
  input[type="text"] { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; padding: 10px 12px; outline: none; transition: border-color 0.2s; }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text-muted); }
  input[type="text"]:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn { padding: 10px 16px; border-radius: 8px; border: none; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #7986cb; }
  .btn-primary:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; transform: none; }
  .btn-secondary { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .btn-secondary:hover { color: var(--text); }
  .btn-stop { background: rgba(239,83,80,0.15); color: var(--red); border: 1px solid rgba(239,83,80,0.3); }
  .btn-stop:hover { background: var(--red); color: #fff; }

  /* AI pickup button */
  .btn-ai { width: 100%; padding: 12px; background: linear-gradient(135deg, rgba(206,147,216,0.2), rgba(92,107,192,0.2)); border: 1px solid rgba(206,147,216,0.4); border-radius: 10px; color: var(--purple); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-ai:hover { background: linear-gradient(135deg, rgba(206,147,216,0.35), rgba(92,107,192,0.35)); border-color: var(--purple); }
  .btn-ai:disabled { opacity: 0.5; cursor: not-allowed; }

  .status-msg { font-size: 12px; padding: 8px 12px; border-radius: 7px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); display: none; }
  .status-msg.show { display: block; }
  .status-msg.ok { border-color: rgba(102,187,106,0.4); color: var(--green); }
  .status-msg.err { border-color: rgba(239,83,80,0.4); color: var(--red); }
  .status-msg.info { border-color: rgba(66,165,245,0.4); color: var(--blue); }
  .status-msg.demo { border-color: rgba(255,202,40,0.4); color: var(--yellow); }

  .filter-group { display: flex; flex-direction: column; gap: 8px; }
  .filter-toggle { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; transition: border-color 0.2s; user-select: none; }
  .filter-toggle:hover { border-color: var(--accent); }
  .filter-toggle input { display: none; }
  .toggle-circle { width: 32px; height: 18px; background: var(--border); border-radius: 9px; position: relative; transition: background 0.2s; flex-shrink: 0; }
  .toggle-circle::after { content: ''; position: absolute; width: 12px; height: 12px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: transform 0.2s; }
  .filter-toggle input:checked ~ .toggle-circle { background: var(--accent); }
  .filter-toggle input:checked ~ .toggle-circle::after { transform: translateX(14px); }

  .view-tabs { display: flex; gap: 6px; }
  .view-tab { flex: 1; padding: 7px 0; border-radius: 7px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .view-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .export-panel { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .export-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
  .export-tab { flex: 1; padding: 6px 0; border-radius: 6px; border: 1px solid var(--border); background: transparent; font-family: 'Noto Sans JP', sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.15s; color: var(--text-muted); }
  .export-tab.active-unanswered { background: var(--surface); border-color: var(--text-muted); color: var(--text); }
  .export-tab.active-blue { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
  .export-tab.active-yellow { background: var(--yellow-bg); border-color: var(--yellow); color: var(--yellow); }
  .export-text { width: 100%; height: 120px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 12px; padding: 10px; resize: none; outline: none; }
  .copy-btn { margin-top: 8px; width: 100%; padding: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; color: var(--text-muted); font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .copy-btn:hover { color: var(--text); border-color: var(--accent); }
  .copy-btn.copied { color: var(--green); border-color: var(--green); }

  /* スプシ保存ボタン */
  .btn-sheet { width: 100%; padding: 12px; background: linear-gradient(135deg, rgba(102,187,106,0.2), rgba(92,107,192,0.1)); border: 1px solid rgba(102,187,106,0.4); border-radius: 10px; color: var(--green); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-sheet:hover { background: linear-gradient(135deg, rgba(102,187,106,0.35), rgba(92,107,192,0.15)); border-color: var(--green); box-shadow: 0 0 16px rgba(102,187,106,0.15); }
  .btn-sheet:disabled { opacity: 0.5; cursor: not-allowed; }

  /* AI pickup result */
  .ai-result { background: var(--purple-bg); border: 1px solid rgba(206,147,216,0.3); border-radius: 12px; padding: 16px; display: none; }
  .ai-result.show { display: block; }
  .ai-result h3 { font-size: 13px; font-weight: 700; color: var(--purple); margin-bottom: 10px; }
  .ai-result-text { width: 100%; height: 200px; background: var(--bg); border: 1px solid rgba(206,147,216,0.2); border-radius: 8px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 12px; padding: 10px; resize: none; outline: none; line-height: 1.7; }
  .ai-copy-btn { margin-top: 8px; width: 100%; padding: 8px; background: transparent; border: 1px solid rgba(206,147,216,0.3); border-radius: 7px; color: var(--purple); font-family: 'Noto Sans JP', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .ai-copy-btn:hover { background: rgba(206,147,216,0.1); }
  .ai-copy-btn.copied { color: var(--green); border-color: var(--green); }

  /* Search */
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; pointer-events: none; }
  .search-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; padding: 10px 36px 10px 34px; outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }
  .search-clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 2px 4px; display: none; }
  .search-clear.show { display: block; }
  .search-count { font-size: 11px; color: var(--text-muted); margin-top: 5px; }
  .search-count span { color: var(--accent); font-weight: 700; }
  mark { background: var(--highlight); color: var(--text); border-radius: 2px; padding: 0 1px; }

  .q-panel { display: flex; flex-direction: column; max-height: calc(100vh - 115px); }
  .q-panel-search { padding: 14px 20px 10px; flex-shrink: 0; border-bottom: 1px solid var(--border); background: var(--bg); }
  .q-panel-list { padding: 16px 20px; overflow-y: auto; flex: 1; }
  .q-list { display: flex; flex-direction: column; gap: 8px; }
  .q-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; transition: all 0.2s; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .q-item.status-blue { background: var(--blue-bg); border-color: rgba(66,165,245,0.4); }
  .q-item.status-yellow { background: var(--yellow-bg); border-color: rgba(255,202,40,0.4); }
  .q-num { font-size: 11px; font-weight: 700; color: var(--text-muted); background: var(--surface2); border-radius: 5px; padding: 2px 7px; flex-shrink: 0; margin-top: 2px; }
  .q-body { flex: 1; }
  .q-text { font-size: 14px; line-height: 1.6; }
  .q-item.status-blue .q-text { color: var(--blue); }
  .q-item.status-yellow .q-text { color: var(--yellow); }
  .q-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .q-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
  .q-btn { padding: 5px 10px; border-radius: 6px; border: none; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .q-btn:active { transform: scale(0.95); }
  .q-btn-blue { background: rgba(66,165,245,0.15); color: var(--blue); border: 1px solid rgba(66,165,245,0.3); }
  .q-btn-blue:hover { background: var(--blue); color: #fff; border-color: var(--blue); }
  .q-item.status-blue .q-btn-blue { background: var(--blue); color: #fff; border-color: var(--blue); }
  .q-btn-yellow { background: rgba(255,202,40,0.12); color: var(--yellow); border: 1px solid rgba(255,202,40,0.3); }
  .q-btn-yellow:hover { background: var(--yellow); color: #111; border-color: var(--yellow); }
  .q-item.status-yellow .q-btn-yellow { background: var(--yellow); color: #111; border-color: var(--yellow); }
  .q-btn-del { background: transparent; color: var(--text-muted); border: 1px solid var(--border); font-size: 12px; padding: 4px 8px; }
  .q-btn-del:hover { color: var(--red); border-color: var(--red); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.8; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); max-height: none; }
  }
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-card">
    <div class="setup-logo">両学長 <span>Q&A</span> Manager</div>
    <p class="setup-desc">初回のみ、YouTube APIキーを入力してください。一度入力するとこのブラウザに保存され、次回からは自動で読み込まれます。</p>
    <label class="setup-label">YouTube APIキー</label>
    <input class="setup-input" type="text" id="api-key-input" placeholder="AIzaSy..." />
    <p class="setup-hint">Google Cloud Console で発行したAPIキーを貼り付けてください。キーはこのブラウザのみに保存されます。</p>
    <button class="setup-btn" onclick="saveApiKey()">保存してはじめる →</button>
    <button class="demo-btn" onclick="startDemo()">🎭 デモモードで試す（APIキー不要）</button>
    <p class="setup-err" id="setup-err"></p>
  </div>
</div>

<div id="app">
  <div class="demo-banner" id="demo-banner">🎭 デモモード：実際のライブチャットを再現しています。質問以外のコメントも流れます！</div>
  <header>
    <div class="logo">両学長 <span>Q&A</span> Manager</div>
    <div class="header-right">
      <button class="small-btn" onclick="resetApiKey()">🔑 APIキーを変更</button>
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat"><span class="stat-num" id="stat-total">0</span><span class="stat-label">総質問数</span></div>
    <div class="stat"><span class="stat-num" id="stat-unanswered" style="color:var(--text-muted)">0</span><span class="stat-label">未回答</span></div>
    <div class="stat"><span class="stat-num blue" id="stat-blue">0</span><span class="stat-label">🎙️ ライブ回答済</span></div>
    <div class="stat"><span class="stat-num yellow" id="stat-yellow">0</span><span class="stat-label">✏️ テキスト回答済</span></div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div>
        <div class="section-label" id="url-label">YouTubeライブURL</div>
        <div class="url-input-row">
          <input type="text" id="yt-url" placeholder="https://www.youtube.com/watch?v=..." />
          <button class="btn btn-primary" id="start-btn" onclick="startFetching()">開始</button>
        </div>
        <div style="margin-top:8px"><div class="status-msg" id="status-msg"></div></div>
        <button class="btn btn-stop" id="stop-btn" style="display:none;margin-top:8px;width:100%" onclick="stopFetching()">⏹ 取得停止</button>
      </div>

      <div>
        <div class="section-label">フィルター設定</div>
        <div class="filter-group">
          <label class="filter-toggle"><input type="checkbox" id="filter-q" checked onchange="refilterDemo()"><span class="toggle-circle"></span>「？」「?」を含む</label>
          <label class="filter-toggle"><input type="checkbox" id="filter-keyword" checked onchange="refilterDemo()"><span class="toggle-circle"></span>「質問」を含む</label>
          <label class="filter-toggle"><input type="checkbox" id="filter-all" checked onchange="refilterDemo()"><span class="toggle-circle"></span>すべて表示（フィルターOFF）</label>
        </div>
      </div>

      <div>
        <div class="section-label">表示切替</div>
        <div class="view-tabs">
          <button class="view-tab active" onclick="setView('all',this)">すべて</button>
          <button class="view-tab" onclick="setView('unanswered',this)">未回答</button>
          <button class="view-tab" onclick="setView('blue',this)">🎙️ライブ</button>
          <button class="view-tab" onclick="setView('yellow',this)">✏️テキスト</button>
        </div>
      </div>

      <div class="export-panel">
        <div class="export-tabs">
          <button class="export-tab active-unanswered" id="etab-unanswered" onclick="setExportTab('unanswered')">未回答</button>
          <button class="export-tab" id="etab-blue" onclick="setExportTab('blue')">🎙️ ライブ</button>
          <button class="export-tab" id="etab-yellow" onclick="setExportTab('yellow')">✏️ テキスト</button>
        </div>
        <textarea class="export-text" id="export-text" readonly placeholder="ここにリストが表示されます…"></textarea>
        <button class="copy-btn" id="copy-btn" onclick="copyExport()">コピー</button>
      </div>

      <!-- スプシ保存 -->
      <button class="btn-sheet" id="sheet-btn" onclick="alert('デモ版ではスプシ保存は使用できません😊')">📊 スプシに保存する</button>
      <div class="status-msg" id="sheet-msg"></div>

      <button class="btn btn-secondary" style="font-size:12px" onclick="if(confirm('全データを削除しますか？'))clearAll()">🗑️ 全削除</button>
    </div>

    <div class="q-panel">
      <div class="q-panel-search">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input class="search-input" type="text" id="search-input" placeholder="キーワードで検索…" oninput="onSearch()" />
          <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
        </div>
        <div class="search-count" id="search-count" style="display:none"><span id="search-count-num">0</span> 件ヒット</div>
      </div>
      <div class="q-panel-list">
        <div class="q-list" id="q-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const DEMO_STREAM = [
    { text: '学長おはようございます！今日も楽しみにしてました', author: 'さくらさん' },
    { text: '投資初心者はまず何から始めるべきですか？', author: 'りんごさん' },
    { text: 'おはようございます〜！毎朝ライブありがとうございます', author: 'みかんさん' },
    { text: 'NISAとiDeCoはどちらを優先すべきでしょうか？', author: 'たろうくん' },
    { text: '今日のご飯はおにぎりにしました🍙', author: 'いちごさん' },
    { text: '学長おはようございます！今日も元気もらえます', author: 'ぶどうさん' },
    { text: '副業の確定申告はどうすればいいですか？', author: 'めろんさん' },
    { text: 'いつも見てます！応援しています！', author: 'ももさん' },
    { text: '緊急予備費はどのくらい貯めればいいですか？', author: 'かきさん' },
    { text: '昨日の動画も最高でした！ありがとうございます', author: 'なしさん' },
    { text: 'インデックス投資とアクティブ投資の違いを教えてください', author: 'くりさん' },
    { text: '大阪から毎朝見てます！本当に勉強になります', author: 'かぼちゃさん' },
    { text: '今の株高で投資を始めるのはリスクが高いですか？', author: 'にんじんさん' },
    { text: '朝からテンション上がります！学長最高！', author: 'だいこんさん' },
    { text: '楽天証券とSBI証券どちらがおすすめですか？', author: 'ほうれんそうさん' },
    { text: 'コーヒー飲みながら視聴中です☕毎朝の習慣になりました', author: 'トマトさん' },
    { text: 'ふるさと納税の限度額の計算方法を教えてください', author: 'きゅうりさん' },
    { text: '質問です！保険は本当に必要ですか？最低限何に入ればいい？', author: 'なすさん' },
    { text: '今日も学長の話が分かりやすくて助かります！', author: 'ピーマンさん' },
    { text: '毎月の積立額はいくらが理想ですか？', author: 'レタスさん' },
    { text: 'おはようございます！眠いけど学長の声で目が覚めます', author: 'キャベツさん' },
    { text: '住宅ローンは変動金利と固定金利どちらがいいですか？', author: 'ブロッコリーさん' },
    { text: '子どもの教育費はどう準備すればいいですか？', author: 'アスパラさん' },
    { text: '仕事前に見るのが最高です！今日も頑張れます', author: 'セロリさん' },
    { text: '米国株と日本株どちらに投資すべきですか？', author: 'パセリさん' },
    { text: '先月からNISA始めました！学長のおかげです', author: 'しいたけさん' },
    { text: 'オルカン一本で本当に大丈夫か不安になることがあります', author: 'えのきさん' },
    { text: 'リベシティ入会してよかったです！情報量がすごい', author: 'まいたけさん' },
    { text: '今日のテーマは何ですか？楽しみです！', author: 'なめこさん' },
    { text: '格安SIMに変えたら月5000円節約できました！', author: 'えりんぎさん' },
  ];

  const MIN_LENGTH = 20; // 20文字以下は除外

  let API_KEY = '';
  let isDemoMode = false;
  let questions = [], allDemoMessages = [], allMessages = [];
  let seenIds = new Set(), seenTexts = new Set(); // 重複除去用
  let currentView = 'all', currentExportTab = 'unanswered', searchQuery = '';
  let fetchTimer = null, demoTimer = null;
  let liveChatId = null, nextPageToken = null, isFetching = false, demoIndex = 0;

  function init() {
    // デモ専用版：APIキー不要で自動的にデモモードを開始
    isDemoMode = true;
    showApp(true);
    setTimeout(startDemoFetch, 800);
  }

  function saveApiKey() {
    const key = document.getElementById('api-key-input').value.trim();
    if (!key || !key.startsWith('AIza')) {
      const err = document.getElementById('setup-err');
      err.style.display = 'block'; err.textContent = 'APIキーを正しく入力してください（AIzaで始まる文字列）'; return;
    }
    localStorage.setItem('yt_api_key', key); API_KEY = key; showApp(false);
  }

  function startDemo() { isDemoMode = true; showApp(true); }

  function showApp(demo) {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    if (demo) {
      document.getElementById('demo-banner').classList.add('show');
      document.getElementById('url-label').textContent = 'デモモード';
      document.getElementById('yt-url').placeholder = '（デモ中はURL不要）';
      document.getElementById('yt-url').disabled = true;
      document.getElementById('start-btn').textContent = '▶ デモ開始';
      document.getElementById('start-btn').onclick = startDemoFetch;
    }
    renderList(); updateStats(); updateExport();
  }

  function resetApiKey() {
    if (!confirm('設定画面に戻りますか？')) return;
    localStorage.removeItem('yt_api_key');
    API_KEY = ''; isDemoMode = false; stopFetching(); clearAll();
    document.getElementById('app').style.display = 'none';
    document.getElementById('demo-banner').classList.remove('show');
    document.getElementById('api-key-input').value = '';
    document.getElementById('setup-screen').style.display = 'flex';
  }

  document.getElementById('api-key-input').addEventListener('keydown', e => { if (e.key === 'Enter') saveApiKey(); });

  // ── フィルター判定（20文字・重複チェック含む）──
  function shouldAdd(text) {
    // 20文字以下は除外
    if (text.length <= MIN_LENGTH) return false;
    // フィルター設定
    const fQ = document.getElementById('filter-q').checked;
    const fKw = document.getElementById('filter-keyword').checked;
    const fAll = document.getElementById('filter-all').checked;
    if (!fAll) {
      const isQ = fQ && (text.includes('？') || text.includes('?'));
      const isKw = fKw && text.includes('質問');
      if (!isQ && !isKw) return false;
    }
    // 重複チェック（正規化して比較）
    const normalized = text.replace(/\s/g, '').toLowerCase();
    if (seenTexts.has(normalized)) return false;
    seenTexts.add(normalized);
    return true;
  }

  // ── デモ ──
  function startDemoFetch() {
    if (isFetching) return;
    isFetching = true; demoIndex = 0; questions = []; allDemoMessages = []; seenTexts = new Set();
    document.getElementById('start-btn').disabled = true;
    document.getElementById('stop-btn').style.display = 'block';
    setStatus('🎭 デモ中… チャットが流れています', 'demo');
    addNextDemoMessage();
  }

  function addNextDemoMessage() {
    if (!isFetching || demoIndex >= DEMO_STREAM.length) {
      if (demoIndex >= DEMO_STREAM.length) { setStatus('🎭 デモ完了！ボタンを自由に試してください', 'demo'); stopFetching(); }
      return;
    }
    const raw = DEMO_STREAM[demoIndex];
    const time = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'});
    const msg = { id: Date.now() + Math.random(), text: raw.text, author: raw.author, time, status: 'none' };
    allDemoMessages.push(msg);
    if (shouldAdd(msg.text)) questions.push(msg);
    demoIndex++;
    renderList(); updateStats(); updateExport();
    demoTimer = setTimeout(addNextDemoMessage, 600 + Math.random() * 1000);
  }

  function refilterDemo() {
    const source = isDemoMode ? allDemoMessages : allMessages;
    if (source.length === 0) return;
    const textStatuses = {};
    questions.forEach(q => { textStatuses[q.text] = q.status; });
    seenTexts = new Set();
    questions = source.filter(m => shouldAdd(m.text)).map(m => ({ ...m, status: textStatuses[m.text] || 'none' }));
    renderList(); updateStats(); updateExport();
  }

  // ── 本番 ──
  function extractVideoId(url) {
    const m = url.match(/(?:v=|youtu\.be\/|live\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  async function startFetching() {
    const url = document.getElementById('yt-url').value.trim();
    if (!url) { setStatus('URLを入力してください', 'err'); return; }
    const videoId = extractVideoId(url);
    if (!videoId) { setStatus('正しいYouTube URLを入力してください', 'err'); return; }
    setStatus('ライブ情報を取得中…', 'info');
    document.getElementById('start-btn').disabled = true;
    try {
      const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=${videoId}&key=${API_KEY}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const item = data.items?.[0];
      if (!item) throw new Error('動画が見つかりません');
      liveChatId = item.liveStreamingDetails?.activeLiveChatId;
      if (!liveChatId) throw new Error('ライブチャットが見つかりません。ライブ配信中か確認してください。');
      setStatus('✅ チャット取得開始！自動更新中…', 'ok');
      document.getElementById('stop-btn').style.display = 'block';
      isFetching = true; nextPageToken = null;
      fetchMessages();
    } catch (e) {
      setStatus('❌ ' + e.message, 'err');
      document.getElementById('start-btn').disabled = false;
    }
  }

  async function fetchMessages() {
    if (!isFetching) return;
    try {
      let apiUrl = `https://www.googleapis.com/youtube/v3/liveChat/messages?liveChatId=${liveChatId}&part=snippet,authorDetails&maxResults=200&key=${API_KEY}`;
      if (nextPageToken) apiUrl += `&pageToken=${nextPageToken}`;
      const res = await fetch(apiUrl);
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      nextPageToken = data.nextPageToken;
      const interval = data.pollingIntervalMillis || 5000;
      let newCount = 0;
      (data.items || []).forEach(item => {
        const id = item.id;
        if (seenIds.has(id)) return;
        seenIds.add(id);
        const text = item.snippet?.displayMessage || '';
        const author = item.authorDetails?.displayName || '';
        const time = new Date(item.snippet?.publishedAt).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'});
        const msg = { id: Date.now() + Math.random(), text, author, time, status: 'none' };
        allMessages.push(msg);
        if (shouldAdd(text)) {
          questions.push(msg);
          newCount++;
        }
      });
      if (newCount > 0) {
        renderList(); updateStats(); updateExport();
        setStatus(`✅ 取得中… (新着 ${newCount}件)`, 'ok');
        setTimeout(() => { if (isFetching) setStatus('✅ 自動更新中…', 'ok'); }, 2000);
      }
      fetchTimer = setTimeout(fetchMessages, interval);
    } catch (e) { setStatus('❌ ' + e.message, 'err'); stopFetching(); }
  }

  function stopFetching() {
    isFetching = false; clearTimeout(fetchTimer); clearTimeout(demoTimer);
    document.getElementById('stop-btn').style.display = 'none';
    document.getElementById('start-btn').disabled = false;
    if (!isDemoMode) setStatus('⏹ 取得停止しました', '');
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status-msg');
    el.textContent = msg; el.className = 'status-msg show' + (type ? ' ' + type : '');
  }

  // ── AI ピックアップ ──
  async function runAiPickup() {
    const unanswered = questions.filter(q => q.status === 'none');
    if (unanswered.length === 0) { alert('未回答の質問がありません'); return; }
    if (unanswered.length < 5) { alert('質問が少なすぎます（5件以上必要です）'); return; }

    const btn = document.getElementById('ai-btn');
    btn.disabled = true; btn.textContent = '⏳ AI分析中…';

    const qList = unanswered.map((q, i) => `${i+1}. ${q.text}`).join('\n');

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: `以下は、両学長リベラルアーツ大学のYouTubeライブに寄せられた未回答の質問リストです。

${qList}

この中から、テキストで回答するのに適した質問を10個ピックアップしてください。
選ぶ基準は以下の通りです：
- 回答を見た人が学びになる質問
- 超個人的な事情ではなく、大勢の人に当てはまる質問
- お金・投資・副業・節税・家計管理など、リベラルアーツ大学のテーマに関連している質問

出力形式：
Q1. （質問文をそのまま）
Q2. （質問文をそのまま）
…
Q10. （質問文をそのまま）

番号と質問文だけを出力してください。理由や説明は不要です。`
          }]
        })
      });

      const data = await res.json();
      const text = data.content?.find(c => c.type === 'text')?.text || '';

      document.getElementById('ai-result-text').value = text;
      document.getElementById('ai-result').classList.add('show');
    } catch (e) {
      alert('AIの呼び出しに失敗しました: ' + e.message);
    } finally {
      btn.disabled = false; btn.textContent = '✨ AIで回答候補10問をピックアップ';
    }
  }

  function copyAiResult() {
    navigator.clipboard.writeText(document.getElementById('ai-result-text').value).then(() => {
      const btn = document.getElementById('ai-copy-btn');
      btn.textContent = '✓ コピーしました'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
    });
  }

  // ── その他 ──
  function setQStatus(id, status) {
    const q = questions.find(q => q.id === id); if (!q) return;
    q.status = q.status === status ? 'none' : status;
    renderList(); updateStats(); updateExport();
  }

  function deleteQ(id) { questions = questions.filter(q => q.id !== id); renderList(); updateStats(); updateExport(); }

  function clearAll() {
    questions = []; allDemoMessages = []; allMessages = []; seenIds = new Set(); seenTexts = new Set();
    nextPageToken = null; demoIndex = 0;
    document.getElementById('ai-result').classList.remove('show');
    renderList(); updateStats(); updateExport();
  }

  function setView(v, btn) {
    currentView = v;
    document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); renderList();
  }

  function setExportTab(tab) {
    currentExportTab = tab;
    ['unanswered','blue','yellow'].forEach(t => {
      document.getElementById('etab-'+t).className = 'export-tab' + (t === tab ? ' active-'+t : '');
    });
    updateExport();
  }

  function onSearch() {
    searchQuery = document.getElementById('search-input').value;
    document.getElementById('search-clear').classList.toggle('show', searchQuery.length > 0);
    renderList();
  }

  function clearSearch() {
    document.getElementById('search-input').value = ''; searchQuery = '';
    document.getElementById('search-clear').classList.remove('show');
    document.getElementById('search-count').style.display = 'none'; renderList();
  }

  function hl(text, q) {
    if (!q) return esc(text);
    return esc(text).replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m => `<mark>${m}</mark>`);
  }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function renderList() {
    const list = document.getElementById('q-list');
    let f = questions;
    if (currentView === 'unanswered') f = questions.filter(q => q.status === 'none');
    else if (currentView === 'blue') f = questions.filter(q => q.status === 'blue');
    else if (currentView === 'yellow') f = questions.filter(q => q.status === 'yellow');
    const q = searchQuery.trim();
    if (q) {
      f = f.filter(x => x.text.includes(q) || x.author.includes(q));
      document.getElementById('search-count').style.display = 'block';
      document.getElementById('search-count-num').textContent = f.length;
    } else { document.getElementById('search-count').style.display = 'none'; }

    if (f.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="icon">${q ? '🔍' : (currentView==='all' ? (isDemoMode?'🎭':'📺') : '📭')}</div><p>${
        q ? `「${esc(q)}」に一致する質問はありません` :
        currentView==='all' ? (isDemoMode?'「▶ デモ開始」を押すとチャットが流れます':'ライブURLを入力して「開始」を押してください') :
        '該当する質問がありません'}</p></div>`;
      return;
    }
    list.innerHTML = f.map(x => {
      const idx = questions.indexOf(x)+1;
      const sl = x.status==='blue'?' · 🎙️ ライブ回答済':x.status==='yellow'?' · ✏️ テキスト回答済':'';
      return `<div class="q-item ${x.status!=='none'?'status-'+x.status:''}">
        <span class="q-num">#${idx}</span>
        <div class="q-body"><div class="q-text">${hl(x.text,q)}</div><div class="q-meta">${x.time} · ${hl(x.author,q)}${sl}</div></div>
        <div class="q-actions">
          <button class="q-btn q-btn-blue" onclick="setQStatus(${x.id},'blue')">🎙️ ライブ</button>
          <button class="q-btn q-btn-yellow" onclick="setQStatus(${x.id},'yellow')">✏️ テキスト</button>
          <button class="q-btn q-btn-del" onclick="deleteQ(${x.id})">🗑️ 削除</button>
        </div></div>`;
    }).join('');
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = questions.length;
    document.getElementById('stat-unanswered').textContent = questions.filter(q=>q.status==='none').length;
    document.getElementById('stat-blue').textContent = questions.filter(q=>q.status==='blue').length;
    document.getElementById('stat-yellow').textContent = questions.filter(q=>q.status==='yellow').length;
  }

  function updateExport() {
    const tab = currentExportTab;
    const items = questions.filter(q => tab==='unanswered'?q.status==='none':tab==='blue'?q.status==='blue':q.status==='yellow');
    const label = tab==='unanswered'?'未回答':tab==='blue'?'🎙️ ライブ回答済':'✏️ テキスト回答済';
    document.getElementById('export-text').value = items.length===0
      ? `${label}の質問はありません`
      : items.map(q=>q.text).join('\n');
  }

  function copyExport() {
    navigator.clipboard.writeText(document.getElementById('export-text').value).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✓ コピーしました'; btn.classList.add('copied');
      setTimeout(()=>{ btn.textContent='コピー'; btn.classList.remove('copied'); }, 2000);
    });
  }

  // ── スプシに保存 ──
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxzJYonFlxIdbY3HVwzuHe8ATvVqTjRqNLsJ6tuo5ODtj6lJJGpkDQ3dElPQD15Yyu0pw/exec';

  async function saveToSheet() {
    if (questions.length === 0) { alert('保存する質問がありません'); return; }
    const btn = document.getElementById('sheet-btn');
    const msg = document.getElementById('sheet-msg');
    btn.disabled = true; btn.textContent = '⏳ 保存中…';

    const today = new Date();
    const dateStr = today.getFullYear() + '-'
      + String(today.getMonth()+1).padStart(2,'0') + '-'
      + String(today.getDate()).padStart(2,'0');

    try {
      const res = await fetch(SHEET_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ date: dateStr, questions: questions })
      });
      const data = await res.json();
      if (data.success) {
        msg.textContent = `✅ ${dateStr} のシートに保存しました！`;
        msg.className = 'status-msg show ok';
      } else {
        throw new Error(data.error || '不明なエラー');
      }
    } catch(e) {
      msg.textContent = '❌ 保存に失敗しました: ' + e.message;
      msg.className = 'status-msg show err';
    } finally {
      btn.disabled = false; btn.textContent = '📊 スプシに保存する';
      setTimeout(() => { msg.className = 'status-msg'; }, 5000);
    }
  }

  init();
</script>
</body>
</html>
